<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Byme Gallery</title>

  <style>
    :root {
      --background: #0d0b10;
      --background-soft: #151119;
      --card-background: rgba(31, 24, 34, 0.8);

      --text: #f1e8ee;
      --muted-text: #b9aab4;
      --faint-text: #766a74;

      --accent: #c89aac;
      --accent-soft: rgba(200, 154, 172, 0.18);

      --border: rgba(241, 232, 238, 0.12);
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.35);

      --card-radius: 22px;
      --page-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;

      color: var(--text);

      background:
        radial-gradient(
          circle at top left,
          rgba(88, 49, 69, 0.22),
          transparent 30%
        ),
        radial-gradient(
          circle at 80% 20%,
          rgba(74, 49, 89, 0.18),
          transparent 28%
        ),
        linear-gradient(
          180deg,
          #0b0910 0%,
          #100d13 44%,
          #0d0b10 100%
        );

      font-family:
        Inter,
        Arial,
        sans-serif;

      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;

      background-image:
        linear-gradient(
          rgba(255, 255, 255, 0.014) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.014) 1px,
          transparent 1px
        );

      background-size: 48px 48px;
    }

    a {
      color: inherit;
    }

    .site-shell {
      width: min(calc(100% - 40px), var(--page-width));
      margin: 0 auto;
    }

    /* Header */

    .hero {
      padding: 84px 0 64px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      margin: 0 0 12px;

      color: var(--accent);

      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: clamp(3rem, 8vw, 6.8rem);
      font-weight: 500;
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .hero-description {
      max-width: 680px;
      margin: 26px 0 0;

      color: var(--muted-text);

      font-size: clamp(1rem, 1.7vw, 1.18rem);
    }

    /* Main layout */

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 56px;

      padding: 54px 0 100px;

      align-items: start;
    }

    .gallery {
      min-width: 0;
    }

    /* Month sections */

    .month-section {
      scroll-margin-top: 28px;
      margin-bottom: 76px;
    }

    .month-heading {
      display: flex;
      align-items: baseline;
      gap: 16px;

      margin: 0 0 22px;
      padding-bottom: 14px;

      border-bottom: 1px solid var(--border);
    }

    .month-heading h2 {
      margin: 0;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: 2rem;
      font-weight: 500;
    }

    .month-heading span {
      color: var(--faint-text);
      font-size: 0.9rem;
    }

    /* Artwork grid */

    .art-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .art-card {
      overflow: hidden;

      border: 1px solid var(--border);
      border-radius: var(--card-radius);

      background:
        linear-gradient(
          180deg,
          rgba(37, 28, 41, 0.9),
          rgba(22, 17, 25, 0.9)
        );

      box-shadow: var(--shadow);

      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background 180ms ease;
    }

    .art-card:hover {
      transform: translateY(-4px);

      border-color: rgba(200, 154, 172, 0.38);

      background:
        linear-gradient(
          180deg,
          rgba(44, 32, 48, 0.96),
          rgba(24, 18, 27, 0.96)
        );
    }

    .image-wrapper {
      position: relative;

      aspect-ratio: 4 / 5;
      overflow: hidden;

      background: #18131c;
    }

    .image-wrapper img {
      display: block;

      width: 100%;
      height: 100%;

      object-fit: cover;

      filter:
        saturate(0.9)
        contrast(1.03);

      transition:
        transform 350ms ease,
        filter 350ms ease;
    }

    .art-card:hover img {
      transform: scale(1.025);

      filter:
        saturate(1)
        contrast(1.05);
    }

    .image-wrapper::after {
      content: "";

      position: absolute;
      inset: 0;

      pointer-events: none;

      background:
        linear-gradient(
          to top,
          rgba(10, 7, 12, 0.24),
          transparent 42%
        );
    }

    .card-content {
      padding: 20px 20px 22px;
    }

    .card-date {
      margin: 0 0 7px;

      color: var(--accent);

      font-size: 0.76rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .card-title {
      margin: 0;

      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: 1.45rem;
      font-weight: 500;
      line-height: 1.25;
    }

    .card-description {
      margin: 10px 0 0;

      color: var(--muted-text);

      font-size: 0.93rem;
    }

    .full-image-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      margin-top: 17px;

      color: var(--text);

      font-size: 0.9rem;
      text-decoration: none;
    }

    .full-image-link:hover {
      color: var(--accent);
    }

    /* Timeline */

    .timeline {
      position: sticky;
      top: 28px;

      max-height: calc(100vh - 56px);
      overflow: auto;

      padding: 22px 18px;

      border: 1px solid var(--border);
      border-radius: 20px;

      background: rgba(20, 15, 23, 0.75);

      backdrop-filter: blur(14px);

      box-shadow: var(--shadow);
    }

    .timeline-title {
      margin: 0 0 16px;

      color: var(--faint-text);

      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .year-group + .year-group {
      margin-top: 10px;
    }

    .year-button {
      display: flex;
      justify-content: space-between;
      align-items: center;

      width: 100%;

      padding: 9px 4px;

      border: none;

      color: var(--text);
      background: transparent;

      font: inherit;
      text-align: left;

      cursor: pointer;
    }

    .year-button strong {
      font-family:
        Georgia,
        "Times New Roman",
        serif;

      font-size: 1.1rem;
      font-weight: 500;
    }

    .arrow {
      color: var(--faint-text);

      transition: transform 160ms ease;
    }

    .year-group.collapsed .arrow {
      transform: rotate(-90deg);
    }

    .month-links {
      display: grid;
      gap: 4px;

      padding: 2px 0 8px 14px;

      border-left: 1px solid var(--border);
    }

    .year-group.collapsed .month-links {
      display: none;
    }

    .month-link {
      display: block;

      padding: 7px 9px;

      border-radius: 10px;

      color: var(--muted-text);

      font-size: 0.9rem;
      text-decoration: none;

      transition:
        color 140ms ease,
        background 140ms ease;
    }

    .month-link:hover,
    .month-link.active {
      color: var(--text);
      background: var(--accent-soft);
    }

    /* Empty gallery */

    .empty-state {
      padding: 80px 24px;

      border: 1px dashed rgba(241, 232, 238, 0.18);
      border-radius: var(--card-radius);

      color: var(--muted-text);

      text-align: center;
    }

    footer {
      padding: 0 0 48px;

      color: var(--faint-text);

      font-size: 0.84rem;
    }

    /* Tablet */

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .timeline {
        position: relative;
        top: auto;

        order: -1;

        max-height: none;
      }
    }

    /* Phone */

    @media (max-width: 640px) {
      .site-shell {
        width: min(calc(100% - 24px), var(--page-width));
      }

      .hero {
        padding: 58px 0 42px;
      }

      .main-layout {
        gap: 30px;
        padding-top: 34px;
      }

      .art-grid {
        grid-template-columns: 1fr;
      }

      .month-section {
        margin-bottom: 52px;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <div class="site-shell">

      <p class="eyebrow">
        
      </p>

      <h1>
        Byme's Gallery
      </h1>

      <p class="hero-description">
       I just put stuff here that are too hot for X or Pixiv</p>

    </div>
  </header>

  <main class="site-shell main-layout">

    <section
      id="gallery"
      class="gallery"
      aria-live="polite">
    </section>

    <aside
      id="timeline"
      class="timeline"
      aria-label="Artwork timeline">
    </aside>

  </main>

  <footer class="site-shell">
    Made as a private-feeling corner of the open web.
  </footer>

  <script>
    /*
      Temporary artwork data.

      Later, we will move this into a separate JSON file
      so Pages CMS can add new artwork automatically.
    */

    

    const monthNames = [
      "January",
      "February",
      "March",
      "April",
      "May",
      "June",
      "July",
      "August",
      "September",
      "October",
      "November",
      "December"
    ];

    function makeId(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function formatDate(dateText) {
      const date = new Date(dateText + "T12:00:00");

      return new Intl.DateTimeFormat("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function groupArtworksByMonth(items) {
      const sortedItems = [...items].sort((first, second) => {
        return second.date.localeCompare(first.date);
      });

      const groups = new Map();

      for (const artwork of sortedItems) {
        const date = new Date(artwork.date + "T12:00:00");

        const year = date.getFullYear();
        const monthNumber = date.getMonth();
        const monthName = monthNames[monthNumber];

        const groupKey =
          year +
          "-" +
          String(monthNumber + 1).padStart(2, "0");

        if (!groups.has(groupKey)) {
          groups.set(groupKey, {
            year: year,
            monthNumber: monthNumber,
            monthName: monthName,
            artworks: []
          });
        }

        groups.get(groupKey).artworks.push(artwork);
      }

      return Array.from(groups.values());
    }

    function createArtworkCard(artwork) {
      return `
        <article class="art-card">

          <div class="image-wrapper">
            <img
              src="${artwork.preview}"
              alt="${artwork.title}"
              loading="lazy">
          </div>

          <div class="card-content">

            <p class="card-date">
              ${formatDate(artwork.date)}
            </p>

            <h3 class="card-title">
              ${artwork.title}
            </h3>

            ${
              artwork.description
                ? `
                  <p class="card-description">
                    ${artwork.description}
                  </p>
                `
                : ""
            }

            <a
              class="full-image-link"
              href="${artwork.full}"
              target="_blank"
              rel="noopener noreferrer">

              View full image

              <span aria-hidden="true">
                ↗
              </span>

            </a>

          </div>

        </article>
      `;
    }

    function displayGallery(groups) {
      const gallery = document.getElementById("gallery");

      if (groups.length === 0) {
        gallery.innerHTML = `
          <div class="empty-state">
            No artwork has been added yet.
          </div>
        `;

        return;
      }

      gallery.innerHTML = groups
        .map((group) => {
          const sectionId =
            "archive-" +
            group.year +
            "-" +
            makeId(group.monthName);

          const artworkCards = group.artworks
            .map(createArtworkCard)
            .join("");

          return `
            <section
              class="month-section"
              id="${sectionId}">

              <div class="month-heading">

                <h2>
                  ${group.monthName}
                </h2>

                <span>
                  ${group.year}
                </span>

              </div>

              <div class="art-grid">
                ${artworkCards}
              </div>

            </section>
          `;
        })
        .join("");
    }

    function displayTimeline(groups) {
      const timeline = document.getElementById("timeline");

      const years = new Map();

      for (const group of groups) {
        if (!years.has(group.year)) {
          years.set(group.year, []);
        }

        years.get(group.year).push(group);
      }

      const yearNumbers = Array.from(years.keys());

      if (yearNumbers.length === 0) {
        timeline.innerHTML = `
          <p class="timeline-title">
            Archive
          </p>

          <p>
            No dates yet.
          </p>
        `;

        return;
      }

      const newestYear = Math.max(...yearNumbers);

      const yearGroups = Array.from(years.entries())
        .map(([year, months]) => {
          const shouldCollapse = year !== newestYear;

          const monthLinks = months
            .map((group) => {
              const sectionId =
                "archive-" +
                group.year +
                "-" +
                makeId(group.monthName);

              return `
                <a
                  class="month-link"
                  href="#${sectionId}"
                  data-target="${sectionId}">

                  ${group.monthName}

                </a>
              `;
            })
            .join("");

          return `
            <div
              class="year-group ${
                shouldCollapse ? "collapsed" : ""
              }">

              <button
                class="year-button"
                type="button"
                aria-expanded="${!shouldCollapse}">

                <strong>
                  ${year}
                </strong>

                <span class="arrow">
                  ⌄
                </span>

              </button>

              <div class="month-links">
                ${monthLinks}
              </div>

            </div>
          `;
        })
        .join("");

      timeline.innerHTML = `
        <p class="timeline-title">
          Archive
        </p>

        ${yearGroups}
      `;

      const yearButtons =
        timeline.querySelectorAll(".year-button");

      yearButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const yearGroup =
            button.closest(".year-group");

          const isNowCollapsed =
            yearGroup.classList.toggle("collapsed");

          button.setAttribute(
            "aria-expanded",
            String(!isNowCollapsed)
          );
        });
      });
    }

    function activateTimelineWhileScrolling() {
      const timelineLinks =
        Array.from(
          document.querySelectorAll(".month-link")
        );

      const monthSections =
        Array.from(
          document.querySelectorAll(".month-section")
        );

      const observer =
        new IntersectionObserver(
          (entries) => {
            const visibleEntries = entries
              .filter((entry) => entry.isIntersecting)
              .sort((first, second) => {
                return (
                  second.intersectionRatio -
                  first.intersectionRatio
                );
              });

            const mostVisible = visibleEntries[0];

            if (!mostVisible) {
              return;
            }

            timelineLinks.forEach((link) => {
              const pointsToVisibleSection =
                link.dataset.target ===
                mostVisible.target.id;

              link.classList.toggle(
                "active",
                pointsToVisibleSection
              );
            });
          },
          {
            rootMargin: "-30% 0px -55% 0px",
            threshold: [0.05, 0.2, 0.5]
          }
        );

      monthSections.forEach((section) => {
        observer.observe(section);
      });
    }
    async function loadArtworks() {
        try {
            const response = await fetch("artworks.json");

            if (!response.ok) {
            throw new Error(
                `Could not load artworks.json. Status: ${response.status}`
            );
            }

            const artworks = await response.json();

            const groupedArtworks =
            groupArtworksByMonth(artworks);

            displayGallery(groupedArtworks);
            displayTimeline(groupedArtworks);
            activateTimelineWhileScrolling();
        } catch (error) {
            console.error(error);

            const gallery =
            document.getElementById("gallery");

            gallery.innerHTML = `
            <div class="empty-state">
                The gallery data could not be loaded.
                Open this website through a local server
                instead of double-clicking index.html.
            </div>
            `;
        }
        }

        loadArtworks();

  </script>

</body>
</html>
